<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${calificacion.id == null ? 'Asignar Calificación' : 'Editar Calificación'}"></title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light" style="margin-left: 0;">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-4">
                <span class="text-secondary"><i class="fas fa-user-circle"></i> Hola, <b th:text="${nombreUsuario}"></b></span>
            </li>
        </ul>
    </nav>

    <div class="content-wrapper" style="margin-left: 0;">
        <section class="content-header">
            <div class="container-fluid">
                <h1 th:text="${calificacion.id == null ? 'Asignar Calificación a Estudiante' : 'Editar Calificación'}"></h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card card-primary">
                            <div class="card-header"><h3 class="card-title">Datos del Registro</h3></div>

                            <form th:action="@{/calificaciones/guardar}" th:object="${calificacion}" method="post">
                                <input type="hidden" th:field="*{id}" th:if="${calificacion.id != null}" />

                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Estudiante</label>
                                        <select class="form-control" th:field="*{estudianteId}" required>
                                            <option value="" disabled selected>-- Selecciona al Estudiante --</option>
                                            <option th:each="est : ${estudiantes}" th:value="${est.id}" th:text="${est.nombre}"></option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label>Curso Materia</label>
                                        <select class="form-control" th:field="*{cursoId}" required>
                                            <option value="" disabled selected>-- Selecciona el Curso --</option>
                                            <option th:each="cur : ${cursos}" th:value="${cur.id}" th:text="${cur.nombre} + ' (Créditos: ' + ${cur.creditos} + ')' "></option>
                                        </select>
                                    </div>

                                    <div class="row">
                                        <div class="col-6 form-group">
                                            <label>Semestre (Ej. 2026-1)</label>
                                            <input type="text" class="form-control" th:field="*{semestre}" required>
                                        </div>
                                        <div class="col-6 form-group">
                                            <label>Calificación Final</label>
                                            <input type="number" step="0.1" class="form-control" th:field="*{calificacion}" required min="0" max="10">
                                        </div>
                                    </div>
                                </div>

                                <div class="card-footer text-right">
                                    <a th:href="@{/calificaciones}" class="btn btn-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-primary"><b>Guardar Registro</b></button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
