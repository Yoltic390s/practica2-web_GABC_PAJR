<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${curso.id == null ? 'Nuevo Curso' : 'Editar Curso'}"></title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light" style="margin-left: 0;">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-4">
                <span class="text-secondary"><i class="fas fa-user-circle"></i> Hola, <b th:text="${nombreUsuario}"></b></span>
            </li>
        </ul>
    </nav>

    <div class="content-wrapper" style="margin-left: 0;">
        <section class="content-header">
            <div class="container-fluid">
                <h1 th:text="${curso.id == null ? 'Registrar Curso' : 'Editar Curso'}"></h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card card-success">
                            <div class="card-header"><h3 class="card-title">Datos del Curso</h3></div>

                            <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
                                <!-- EL CAMBIO MÁGICO: th:if previene que se envíe vacío al crear uno nuevo -->
                                <input type="hidden" th:field="*{id}" th:if="${curso.id != null}" />

                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Código del Curso (Ej. CS101)</label>
                                        <input type="text" class="form-control" th:field="*{codigo}" required maxlength="10">
                                    </div>
                                    <div class="form-group">
                                        <label>Nombre del Curso</label>
                                        <input type="text" class="form-control" th:field="*{nombre}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Créditos</label>
                                        <input type="number" class="form-control" th:field="*{creditos}" required min="1" max="20">
                                    </div>
                                </div>
                                <div class="card-footer text-right">
                                    <a th:href="@{/cursos}" class="btn btn-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-success">Guardar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
