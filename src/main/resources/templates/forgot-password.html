<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar Contraseña | SAES</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
  <link rel="stylesheet" th:href="@{/plugins/icheck-bootstrap/icheck-bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a th:href="@{/}"><b>SAES</b>UPIIZ</a>
  </div>

  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">¿Olvidaste tu contraseña? Aquí puedes establecer una nueva.</p>

      <!-- Mensaje de error si la boleta no existe -->
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <!-- Formulario que envía datos al POST /forgot-password -->
      <form th:action="@{/forgot-password}" method="post">

        <div class="input-group mb-3">
          <!-- Pedimos la boleta -->
          <input type="text" name="boleta" class="form-control" placeholder="Ingresa tu Boleta" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-id-card"></span>
            </div>
          </div>
        </div>

        <div class="input-group mb-3">
          <!-- Pedimos la nueva contraseña -->
          <input type="password" name="nuevaContrasena" class="form-control" placeholder="Nueva Contraseña" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Restablecer Contraseña</button>
          </div>
        </div>
      </form>

      <p class="mt-3 mb-1">
        <a th:href="@{/login}">Regresar al Login</a>
      </p>
      <p class="mb-0">
        <a th:href="@{/register}" class="text-center">Registrarse por primera vez</a>
      </p>
    </div>
  </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
