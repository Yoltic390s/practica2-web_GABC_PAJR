<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${cliente.idCliente == null ? 'Nuevo Cliente' : 'Editar Cliente'}"></title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light" style="margin-left: 0;">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-4">
                <span class="text-secondary"><i class="fas fa-user-circle"></i> Hola, <b th:text="${nombreUsuario}"></b></span>
            </li>
        </ul>
    </nav>

    <div class="content-wrapper" style="margin-left: 0;">
        <section class="content-header">
            <div class="container-fluid">
                <h1 th:text="${cliente.idCliente == null ? 'Registrar Cliente' : 'Editar Cliente'}"></h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card card-warning">
                            <div class="card-header"><h3 class="card-title">Datos del Cliente</h3></div>

                            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                                <!-- EL CAMBIO MÁGICO PARA CLIENTES -->
                                <input type="hidden" th:field="*{idCliente}" th:if="${cliente.idCliente != null}" />

                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Nombre Completo</label>
                                        <input type="text" class="form-control" th:field="*{nombreCompleto}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Teléfono</label>
                                        <input type="text" class="form-control" th:field="*{telefono}">
                                    </div>
                                    <div class="form-group">
                                        <label>Correo Electrónico (Opcional)</label>
                                        <input type="email" class="form-control" th:field="*{correo}">
                                    </div>
                                </div>
                                <div class="card-footer text-right">
                                    <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-warning"><b>Guardar Cliente</b></button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
