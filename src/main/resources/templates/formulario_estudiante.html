<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${estudiante.id == null ? 'Nuevo Estudiante' : 'Editar Estudiante'}"></title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light" style="margin-left: 0;">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-4">
                <span class="text-secondary"><i class="fas fa-user-circle"></i> Hola, <b th:text="${nombreUsuario}"></b></span>
            </li>
        </ul>
    </nav>

    <div class="content-wrapper" style="margin-left: 0;">
        <section class="content-header">
            <div class="container-fluid">
                <h1 th:text="${estudiante.id == null ? 'Registrar Estudiante' : 'Editar Estudiante'}"></h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card card-primary">
                            <div class="card-header"><h3 class="card-title">Datos</h3></div>

                            <form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
                                <input type="hidden" th:field="*{id}" />
                                <div class="card-body">
                                    <div class="form-group">
                                        <label>Matrícula</label>
                                        <input type="text" class="form-control" th:field="*{matricula}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Nombre Completo</label>
                                        <input type="text" class="form-control" th:field="*{nombre}" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Carrera</label>
                                        <select class="form-control" th:field="*{carrera}">
                                            <option value="Sistemas Computacionales">Sistemas Computacionales</option>
                                            <option value="Mecatrónica">Mecatrónica</option>
                                            <option value="Ambiental">Ambiental</option>
                                            <option value="Ciencias de Datos">Ciencias de Datos</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="card-footer text-right">
                                    <a th:href="@{/estudiantes}" class="btn btn-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-primary">Guardar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
